name: Validate ETF runtime changes

on:
  push:
    branches:
      - main
    paths:
      - "pricing/**"
      - "send_report.py"
      - "etf.txt"
      - "etf-pro.txt"
      - ".github/workflows/validate-etf-runtime.yml"
  workflow_dispatch:

jobs:
  validate-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib mistune weasyprint pyyaml

      - name: Run pricing pass dry run
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          python -m pricing.run_pricing_pass

      - name: Validate HTML/PDF render only
        env:
          MRKT_RPRTS_REPORT_MODE: pro
        run: |
          python - <<'PY'
          from pathlib import Path
          import send_report as sr
          output_dir = Path("output")
          latest = sr.latest_report_file(output_dir, mode="pro")
          sr.generate_delivery_assets(output_dir, latest, mode="pro")
          print(f"VALIDATION_OK | mode=pro | report={latest.name}")
          PY
